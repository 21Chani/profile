<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Galaxy Background</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050505; overflow: hidden; }

  /* ══════════════════════════════════════════════════════
     CONTAINER — holds WebGL canvas + 2D glow overlay
     ══════════════════════════════════════════════════════ */
  .galaxy-wrapper {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    overflow: hidden;

    /* ══════════════════════════════════════════════════
       VIGNETTE via CSS mask-image
       ══════════════════════════════════════════════════

       Radial gradient as alpha mask:
         black (opaque)  → content visible
         transparent     → hidden (shows body bg)

       Format:
         ellipse <W%> <H%> at <X%> <Y%>,
           solid at <start%>, gone at <end%>

       ┌──────────────────────────────────────────────┐
       │  TIGHTER   → smaller W%/H%, lower start%    │
       │  LOOSER    → larger W%/H%, higher start%    │
       │  OFFSET    → shift at X% Y%                 │
       │  SHARPER   → start% closer to end%          │
       │  SOFTER    → start% further from end%       │
       ├──────────────────────────────────────────────┤
       │  Current:  64% 60%, solid 30%, gone 100%    │
       │  Tight:    45% 40%, solid 20%, gone 100%    │
       │  Wide:     85% 80%, solid 40%, gone 100%    │
       │  None:     remove mask-image entirely       │
       └──────────────────────────────────────────────┘
    */
    mask-image: radial-gradient(
      ellipse 64% 60% at 50% 50%,
      rgba(0,0,0,1) 30%,
      rgba(0,0,0,0) 100%
    );
    -webkit-mask-image: radial-gradient(
      ellipse 64% 60% at 50% 50%,
      rgba(0,0,0,1) 30%,
      rgba(0,0,0,0) 100%
    );
  }

  .galaxy-wrapper canvas {
    position: absolute; top: 0; left: 0;
    pointer-events: none;
  }
  #heroGlow { z-index: 1; }
  #heroWaveform { z-index: 0; }
</style>
</head>
<body>

<div class="galaxy-wrapper">
  <canvas id="heroWaveform"></canvas>
  <canvas id="heroGlow"></canvas>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  ASCII MILKY WAY — WebGL Galaxy Background
//
//  Chars:       · ∙ + * #  (density ramp dim→bright)
//  Perspective: Y-tilt 0.57, rotation 19° (0.3316 rad)
//  Brightness:  max 0.35 bright, 0.19 alpha
//  Particles:   ~8-12k depending on viewport
//  Performance: single drawArrays call, STATIC_DRAW buffer
//
//  Wrapped in try/catch so failure won't break other scripts.
// ═══════════════════════════════════════════════════════
try {
(() => {
  const glCanvas = document.getElementById('heroWaveform');
  if (!glCanvas) return;
  const gl = glCanvas.getContext('webgl', { alpha: false, antialias: false });
  if (!gl) { console.warn('WebGL not available'); return; }

  const glowCanvas = document.getElementById('heroGlow');
  const glowCtx = glowCanvas.getContext('2d');

  // ─── Atlas ───
  const ATLAS_CELL = 64, ATLAS_FONT = 44, ATLAS_PAD = 8;
  const ALL_CHARS = ['·', '∙', '+', '*', '#'];
  let atlasCellTotal, atlasWidth, atlasHeight;

  function createAtlas() {
    const count = ALL_CHARS.length, cellTotal = ATLAS_CELL + ATLAS_PAD;
    const ac = document.createElement('canvas');
    ac.width = count * cellTotal; ac.height = cellTotal;
    const ctx = ac.getContext('2d');
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, ac.width, ac.height);
    ctx.font = ATLAS_FONT + 'px "Courier New","SF Mono",monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillStyle = '#fff';
    for (let i = 0; i < count; i++)
      ctx.fillText(ALL_CHARS[i], i * cellTotal + ATLAS_CELL / 2 + ATLAS_PAD / 2, cellTotal / 2);
    const tex = gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.pixelStorei(gl.UNPACK_PREMULTIPLY_ALPHA_WEBGL, false);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, ac);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
    atlasCellTotal = cellTotal; atlasWidth = ac.width; atlasHeight = ac.height;
    return tex;
  }

  // ─── Shaders ───
  const VERT_SRC = `
    attribute float a_baseAngle; attribute float a_dist; attribute float a_charIndex;
    attribute float a_baseBright; attribute float a_armStr; attribute float a_pointSize;
    uniform float u_time; uniform vec2 u_resolution; uniform vec2 u_center; uniform float u_galaxyR;
    varying float v_charIndex; varying vec3 v_color; varying float v_alpha;

    const float ORB_CORE=0.02, ORB_EDGE=0.003, CORE_F=0.06, BULGE_F=0.20;

    // ┌─────────────────────────────────────────────┐
    // │  PERSPECTIVE                                │
    // │  TILT  0.57  → Y compression (3D angle)    │
    // │              1.0 = face-on, 0.2 = edge-on  │
    // │  ROT   0.3316 → 19° rotation               │
    // │              0.0 = horizontal ellipse       │
    // └─────────────────────────────────────────────┘
    const float TILT = 0.57;
    const float ROT  = 0.3316;

    void main(){
      float nd = a_dist / u_galaxyR;
      float cl = min(nd, 2.5);
      float spd = ORB_CORE + (ORB_EDGE - ORB_CORE) * sqrt(cl / 2.5);
      float curAngle = a_baseAngle + spd * u_time;

      vec2 offset = vec2(cos(curAngle), sin(curAngle) * TILT) * a_dist;
      float cr = cos(ROT), sr = sin(ROT);
      offset = vec2(offset.x*cr - offset.y*sr, offset.x*sr + offset.y*cr);
      vec2 pos = u_center + offset;

      float arm = a_armStr, bright = a_baseBright, alpha = 0.0, pSize = a_pointSize;

      if (nd < CORE_F) { alpha = 0.0; }
      else if (nd < BULGE_F) {
        float f = (nd-CORE_F)/(BULGE_F-CORE_F);
        bright = 0.30+(1.0-f)*0.15+arm*0.10;
        alpha = 0.25*(1.0-f*0.4)*(0.4+0.6*arm)+0.05;
        pSize += (1.0-f)*0.8;
      } else if (nd <= 1.15) {
        float ef = nd>0.85 ? (1.15-nd)/0.30 : 1.0;
        bright = a_baseBright*0.15 + arm*0.35*ef;
        alpha = (0.06+arm*arm*0.18)*ef;
        if (arm>0.85) { bright+=0.25; alpha=min(alpha+0.10,0.35); }
      } else {
        float hf = clamp(1.0-(nd-1.15)/1.0, 0.0, 1.0);
        bright = a_baseBright*0.25; alpha = 0.05*hf;
      }

      // ┌─────────────────────────────────────────────┐
      // │  BRIGHTNESS CLAMPS                          │
      // │  bright  clamp(0.03, 0.35)                  │
      // │  alpha   clamp(0.0,  0.19)                  │
      // │  Higher values = brighter galaxy            │
      // └─────────────────────────────────────────────┘
      bright = clamp(bright, 0.03, 0.35);
      alpha  = clamp(alpha,  0.0,  0.19);

      vec2 cp = (pos/u_resolution)*2.0 - 1.0; cp.y = -cp.y;
      gl_Position = vec4(cp, 0.0, 1.0);
      gl_PointSize = max(1.0, pSize);
      v_charIndex = a_charIndex; v_color = vec3(bright); v_alpha = alpha;
    }`;

  const FRAG_SRC = `
    precision mediump float;
    varying float v_charIndex; varying vec3 v_color; varying float v_alpha;
    uniform sampler2D u_atlas; uniform float u_cellTotal; uniform vec2 u_atlasSize;
    void main(){
      if(v_alpha < 0.01) discard;
      float ci = floor(v_charIndex + 0.5);
      float padHalf = (u_cellTotal - ${ATLAS_CELL}.0) * 0.5;
      float cellX = ci*u_cellTotal + padHalf, cellY = padHalf;
      vec2 uv = vec2(
        (cellX + gl_PointCoord.x*${ATLAS_CELL}.0) / u_atlasSize.x,
        (cellY + gl_PointCoord.y*${ATLAS_CELL}.0) / u_atlasSize.y
      );
      float mask = texture2D(u_atlas, uv).r;
      if(mask < 0.1) discard;
      gl_FragColor = vec4(v_color*mask, v_alpha*mask);
    }`;

  function compileShader(t,s) { const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));return null}return sh }
  function linkProg(v,f) { const p=gl.createProgram();gl.attachShader(p,v);gl.attachShader(p,f);gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null}return p }

  const vs=compileShader(gl.VERTEX_SHADER,VERT_SRC), fs=compileShader(gl.FRAGMENT_SHADER,FRAG_SRC), program=linkProg(vs,fs);
  const aLoc = { baseAngle:gl.getAttribLocation(program,'a_baseAngle'), dist:gl.getAttribLocation(program,'a_dist'), charIndex:gl.getAttribLocation(program,'a_charIndex'), baseBright:gl.getAttribLocation(program,'a_baseBright'), armStr:gl.getAttribLocation(program,'a_armStr'), pointSize:gl.getAttribLocation(program,'a_pointSize') };
  const uLoc = { time:gl.getUniformLocation(program,'u_time'), resolution:gl.getUniformLocation(program,'u_resolution'), center:gl.getUniformLocation(program,'u_center'), galaxyR:gl.getUniformLocation(program,'u_galaxyR'), atlas:gl.getUniformLocation(program,'u_atlas'), cellTotal:gl.getUniformLocation(program,'u_cellTotal'), atlasSize:gl.getUniformLocation(program,'u_atlasSize') };
  const atlasTex = createAtlas();

  let W, H, galaxyCX, galaxyCY, galaxyRadius, particleCount=0, vbo=null, time=0, lastFrame=0;
  const FLOATS_PER=6, TAU=Math.PI*2;

  // ┌─────────────────────────────────────────────────────┐
  // │  GALAXY GEOMETRY                                    │
  // │  GALAXY_RADIUS_FRAC  0.75  → size vs viewport      │
  // │  NUM_ARMS            4     → spiral arm count       │
  // │  SPIRAL_TURNS        2.5   → full turns per arm     │
  // │  SPIRAL_TIGHT        0.32  → tightness exponent     │
  // │  ARM_WIDTH           3.0   → angular scatter (rad)  │
  // └─────────────────────────────────────────────────────┘
  const GALAXY_RADIUS_FRAC=0.75, NUM_ARMS=4, SPIRAL_TURNS=2.5, SPIRAL_TIGHT=0.32, ARM_WIDTH=3.0;

  // ┌─────────────────────────────────────────────────────┐
  // │  PARTICLE COUNTS                                    │
  // │  Multiply all by same factor to scale density.      │
  // │  e.g. ×1.5 = 50% more stars, ×0.5 = half           │
  // │                                                     │
  // │  BULGE      80   central region                     │
  // │  ARM_STEPS  150  sample points per arm              │
  // │  ARM_LAT    6    lateral dots per sample            │
  // │  INTER_ARM  350  filler between arms               │
  // │  BG         120  background scatter (viewport-scaled)│
  // │  SPINE      300  bright arm center reinforcement    │
  // └─────────────────────────────────────────────────────┘
  const BULGE=80, ARM_STEPS=150, ARM_LAT=6, INTER_ARM=350, BG=120, SPINE=300;

  function gaussRand(){const u1=Math.random(),u2=Math.random();return Math.sqrt(-2*Math.log(u1+0.0001))*Math.cos(TAU*u2)}
  function spiralAngle(nd,ai){return(ai/NUM_ARMS)*TAU+SPIRAL_TURNS*TAU*Math.pow(nd,SPIRAL_TIGHT)}
  function simpleNoise(x){const s=Math.sin(x*127.1+311.7)*43758.5453;return s-Math.floor(s)}
  function backboneWobble(nd,ai){const n1=simpleNoise(nd*4+ai*7.3)-.5,n2=simpleNoise(nd*8.7+ai*13.1)-.5,n3=simpleNoise(nd*15.3+ai*21.7)-.5;return(n1*.5+n2*.3+n3*.2)*(.3+.7*nd)}

  // Density ramp: dim→light chars, bright→heavy chars
  function pickChar(as){
    if(as>.8) return 3+Math.floor(Math.random()*2);  // * #
    if(as>.5) return 2+Math.floor(Math.random()*2);  // + *
    if(as>.25)return 1+Math.floor(Math.random()*2);  // ∙ +
    return Math.floor(Math.random()*2);               // · ∙
  }

  function buildParticles(){
    const dots=[];
    function addDot(a,d,as,b,ps,ci){dots.push(a,d,ci,b,as,ps)}

    // Bulge
    const bI=galaxyRadius*.06,bO=galaxyRadius*.2,bD=Math.floor(BULGE*(galaxyRadius/300));
    for(let i=0;i<bD;i++){const r=bI+Math.random()*(bO-bI),a=Math.random()*TAU,nd=r/galaxyRadius;let best=0;for(let ai=0;ai<NUM_ARMS;ai++){const sa=spiralAngle(nd,ai)+backboneWobble(nd,ai);let d=a-sa;d-=Math.round(d/TAU)*TAU;best=Math.max(best,Math.max(0,1-Math.abs(d)/.8))}const as=.3+.7*best;addDot(a,r,as,.4+Math.random()*.3,22+Math.random()*3,pickChar(as))}

    // Arm scatter
    for(let ai=0;ai<NUM_ARMS;ai++){for(let s=0;s<ARM_STEPS;s++){const nd=.12+(s/ARM_STEPS)*1.03,dist=nd*galaxyRadius,sa=spiralAngle(nd,ai)+backboneWobble(nd,ai),lw=ARM_WIDTH*(.3+.8*nd),lc=Math.floor(ARM_LAT*(.5+.8*nd)),ef=nd>.85?Math.max(0,(1.15-nd)/.3):1;
    for(let d=0;d<lc;d++){const sc=gaussRand()*lw*.55,da=sa+sc,rj=gaussRand()*galaxyRadius*.06*nd,dd=dist+rj;if(dd<0)continue;const ns=Math.abs(sc)/lw,as=Math.max(0,1-ns*ns),b=.15+Math.random()*.25+as*.3*ef;addDot(da,dd,as*ef,b,20+as*4+Math.random()*3,pickChar(as))}}}

    // Inter-arm
    const iD=Math.floor(INTER_ARM*(galaxyRadius/300));
    for(let i=0;i<iD;i++){const nd=.15+Math.random()*.95,d=nd*galaxyRadius,a=Math.random()*TAU;addDot(a,d,.1+Math.random()*.15,.15+Math.random()*.2,18+Math.random()*3,pickChar(.1))}

    // Background
    const bgD=Math.floor(BG*Math.max(W,H)/1000);
    for(let i=0;i<bgD;i++){const x=Math.random()*W,y=Math.random()*H,dx=x-galaxyCX,dy=y-galaxyCY,d=Math.sqrt(dx*dx+dy*dy),a=Math.atan2(dy,dx);addDot(a,d,.08+Math.random()*.1,.12+Math.random()*.15,18+Math.random()*3,pickChar(.1))}

    // Spine
    for(let ai=0;ai<NUM_ARMS;ai++){for(let s=0;s<SPINE;s++){const nd=.1+(s/SPINE)*1,dist=nd*galaxyRadius,sa=spiralAngle(nd,ai)+backboneWobble(nd,ai),tw=.18*(.3+.7*nd),ef=nd>.85?Math.max(0,(1.1-nd)/.25):1;
    for(let d=0;d<4;d++){const sc=gaussRand()*tw*.4,da=sa+sc,rj=gaussRand()*galaxyRadius*.018*nd,dd=dist+rj;if(dd<0)continue;const ns=Math.abs(sc)/tw,as=Math.max(0,1-ns*ns);addDot(da,dd,Math.min(1,as*ef+.3),.3+Math.random()*.2+as*.3*ef,20+as*3+Math.random()*2,pickChar(.8))}}}

    particleCount=dots.length/FLOATS_PER;
    if(vbo)gl.deleteBuffer(vbo);
    vbo=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,vbo);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(dots),gl.STATIC_DRAW);
  }

  function renderGlow(){
    glowCanvas.width=W;glowCanvas.height=H;
    const ctx=glowCtx;ctx.clearRect(0,0,W,H);
    const bR=galaxyRadius*.2*2,g2=ctx.createRadialGradient(galaxyCX,galaxyCY,0,galaxyCX,galaxyCY,bR);
    g2.addColorStop(0,'rgba(220,220,220,0.012)');g2.addColorStop(.5,'rgba(150,150,150,0.004)');g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);
  }

  // Pause when off-screen
  let visible=true;
  const obs=new IntersectionObserver(e => { visible=e[0].isIntersecting }, { threshold:0.05 });
  obs.observe(glCanvas.parentElement);

  function init(){
    const rect=glCanvas.parentElement.getBoundingClientRect();
    W=rect.width;H=rect.height;
    glCanvas.width=W;glCanvas.height=H;
    glowCanvas.width=W;glowCanvas.height=H;
    galaxyCX=W*.5;galaxyCY=H*.5;galaxyRadius=Math.min(W,H)*GALAXY_RADIUS_FRAC;
    gl.viewport(0,0,W,H);buildParticles();renderGlow();
  }

  function render(ts){
    requestAnimationFrame(render);
    if(!visible)return;
    const dt=Math.min((ts-lastFrame)/1000,.05);lastFrame=ts;time+=dt;
    gl.clearColor(0.0196,0.0196,0.0196,1);gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(program);
    gl.uniform1f(uLoc.time,time);gl.uniform2f(uLoc.resolution,W,H);gl.uniform2f(uLoc.center,galaxyCX,galaxyCY);
    gl.uniform1f(uLoc.galaxyR,galaxyRadius);gl.uniform1f(uLoc.cellTotal,atlasCellTotal);gl.uniform2f(uLoc.atlasSize,atlasWidth,atlasHeight);
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,atlasTex);gl.uniform1i(uLoc.atlas,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,vbo);
    const stride=FLOATS_PER*4;
    gl.enableVertexAttribArray(aLoc.baseAngle);gl.vertexAttribPointer(aLoc.baseAngle,1,gl.FLOAT,false,stride,0);
    gl.enableVertexAttribArray(aLoc.dist);gl.vertexAttribPointer(aLoc.dist,1,gl.FLOAT,false,stride,4);
    gl.enableVertexAttribArray(aLoc.charIndex);gl.vertexAttribPointer(aLoc.charIndex,1,gl.FLOAT,false,stride,8);
    gl.enableVertexAttribArray(aLoc.baseBright);gl.vertexAttribPointer(aLoc.baseBright,1,gl.FLOAT,false,stride,12);
    gl.enableVertexAttribArray(aLoc.armStr);gl.vertexAttribPointer(aLoc.armStr,1,gl.FLOAT,false,stride,16);
    gl.enableVertexAttribArray(aLoc.pointSize);gl.vertexAttribPointer(aLoc.pointSize,1,gl.FLOAT,false,stride,20);
    gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);gl.disable(gl.DEPTH_TEST);
    gl.drawArrays(gl.POINTS,0,particleCount);
  }

  window.addEventListener('resize',init);
  init();requestAnimationFrame(render);
})();
} catch(e) { console.warn('Galaxy background failed:', e); }
</script>
</body>
</html>
